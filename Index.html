<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advance Happy Birthday 🎀</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: white;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 2rem;
}

#countdown {
    font-size: 1.8rem;
    margin-top: 20px;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: #ff4081;
    color: white;
    margin-left: 10px;
}

img {
    width: 220px;
    border-radius: 20px;
    margin-top: 15px;
}

#mainContent {
    display: none;
}
</style>
</head>

<body>

<!-- Countdown -->
<div class="container" id="countdownPage">
    <h1>🎂 Countdown for dine ma 🐣🌎🎀 🎂</h1>
    <div id="countdown">Loading...</div>
</div>

<!-- Password -->
<div class="container" id="loginPage" style="display:none;">
    <h1>Enter Surprise Password 🔒</h1>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>
</div>

<!-- Main Content -->
<div class="container" id="mainContent">
    <h1>🎉 Advance Happy Birthday 🎉</h1>
    <h2>dine ma 🐣🌎🎀</h2>
    <img src="dinesh.jpg" alt="Photo">
    <p>
        Advance Happy Birthday 💖<br>
        May your life be filled with happiness, smiles and success 🌸✨<br>
        Stay happy always 🐣🎀
    </p>
</div>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// 🎂 Birthday: April 5, 2026
let birthday = new Date("2026-04-05 00:00:00").getTime();

let countdownFunction = setInterval(function () {
    let now = new Date().getTime();
    let distance = birthday - now;

    let days = Math.floor(distance / (1000 * 60 * 60 * 24));
    let hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    let minutes = Math.floor((distance / (1000 * 60)) % 60);
    let seconds = Math.floor((distance / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

    if (distance < 0) {
        clearInterval(countdownFunction);
        document.getElementById("countdownPage").style.display = "none";
        document.getElementById("loginPage").style.display = "block";
    }
}, 1000);

// 🔒 Password = dine6654
function checkPassword() {
    let pass = document.getElementById("password").value;

    if (pass === "dine6654") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        startConfetti();
    } else {
        alert("Wrong Password 😢");
    }
}

// 🎉 Confetti
function startConfetti() {
    var duration = 6 * 1000;
    var end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 6,
            angle: 60,
            spread: 70,
            origin: { x: 0 }
        });
        confetti({
            particleCount: 6,
            angle: 120,
            spread: 70,
            origin: { x: 1 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
}
</script>

</body>
</html>
